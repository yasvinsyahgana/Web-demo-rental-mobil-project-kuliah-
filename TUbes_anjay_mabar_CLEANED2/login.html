<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Quick Rent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .form-container h2 {
            margin-bottom: 1.5rem;
            color: #333;
            font-size: 1.8rem;
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 25px;
            background: #667eea;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .toggle-form {
            margin-top: 1.5rem;
            color: #666;
        }

        .toggle-form a {
            color: #667eea;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        #signup-form {
            display: none;
        }

    </style>
</head>
<body>

    <div class="container">

        <div id="login-form" class="form-container">
            <h2>Login Akun</h2>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <div class="input-group">
                    <label for="login-role">Login sebagai</label>
                    <select id="login-role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
            <p class="toggle-form">
                Belum punya akun? <a onclick="showSignUp()">Buat di sini</a>
            </p>
        </div>

        <div id="signup-form" class="form-container">
            <h2>Buat Akun Baru</h2>
            <form onsubmit="handleSignUp(event)">
                <div class="input-group">
                    <label for="signup-name">Nama Lengkap</label>
                    <input type="text" id="signup-name" required>
                </div>
                <div class="input-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required>
                </div>
                <div class="input-group">
                    <label for="konfirm-password">konfirm password</label>
                    <input type="konfirm-password" id="signup-password" required>
                </div>
                 <div class="input-group">
                    <label for="signup-role">Daftar sebagai</label>
                    <select id="signup-role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Buat Akun</button>
            </form>
            <p class="toggle-form">
                Sudah punya akun? <a onclick="showLogin()">Login di sini</a>
            </p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');

        // Fungsi untuk menampilkan form Sign Up dan menyembunyikan form Login
        function showSignUp() {
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
        }

        // Fungsi untuk menampilkan form Login dan menyembunyikan form Sign Up
        function showLogin() {
            signupForm.style.display = 'none';
            loginForm.style.display = 'block';
        }

        // --- MANAJEMEN AKUN ---
        // Menggunakan localStorage agar data akun tidak hilang saat browser ditutup

        function handleSignUp(event) {
            event.preventDefault(); // Mencegah form mengirim data secara default

            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const role = document.getElementById('signup-role').value;

            // Ambil data user yang sudah ada dari localStorage, atau buat array baru jika belum ada
            const users = JSON.parse(localStorage.getItem('quickRentUsers')) || [];

            // Cek apakah email sudah terdaftar
            const userExists = users.find(user => user.email === email);
            if (userExists) {
                alert('Email sudah terdaftar. Silakan gunakan email lain atau login.');
                return;
            }

            // Tambahkan user baru
            users.push({ name, email, password, role });

            // Simpan kembali ke localStorage
            localStorage.setItem('quickRentUsers', JSON.stringify(users));

            alert('Akun berhasil dibuat! Silakan login.');
            showLogin(); // Arahkan ke form login setelah berhasil mendaftar
            event.target.reset(); // Reset form pendaftaran
        }
        
    // ... (kode lainnya) ...

    function handleLogin(event) {
        event.preventDefault();

        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const role = document.getElementById('login-role').value;

        const users = JSON.parse(localStorage.getItem('quickRentUsers')) || [];

        const foundUser = users.find(user => 
            user.email === email && 
            user.password === password && 
            user.role === role
        );

        if (foundUser) {
            alert(`Login berhasil! Selamat datang, ${foundUser.name}.`);
            // Arahkan berdasarkan peran
            if (foundUser.role === 'admin') {
                window.location.href = 'admin_dashboard.html'; // Arahkan ke dashboard admin
            } else {
                window.location.href = 'dashboard.html'; // Arahkan ke dashboard user
            }
        } else {
            alert('Login gagal. Periksa kembali email, password, dan peran Anda.');
        }
    }
    </script>
</body>
</html>
